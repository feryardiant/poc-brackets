name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: true

      - name: Lint
        run: pnpm lint

  unit:
    name: Unit Test
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: true

      - name: Test
        env:
          COLUMN: 120
        run: pnpm test:unit --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: test/reports
          flags: unit-tests
          report_type: coverage

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: test/reports
          report_type: test_results

  playwright:
    name: Browser Test [playwright]
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: true

      - name: Get playwright version
        id: playwright
        run: echo "version=$(pnpm info playwright --json | jq -r '.version')" >> $GITHUB_ENV

      - name: Setup playwright cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: pnpm-playwright${{ steps.playwright.outputs.version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-playwright${{ steps.playwright.outputs.version }}-

      - name: Setup playwright
        run: pnpx playwright install chromium --only-shell

      - name: Test
        env:
          COLUMN: 120
        run: pnpm test:playwright --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: test/reports/coverage
          flags: browser-tests
          report_type: coverage

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: test/reports
          report_type: test_results
